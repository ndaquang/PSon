<html lang="vi">

<title>Checklist Quy trình dự án D&B — VITECCONS</title>
<style>
:root{
  --bg:#0f172a; --panel:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --brand:#0b4a8f; --brand2:#1266c4; --accent:#f59e0b;
  --todo:#94a3b8; --doing:#f59e0b; --done:#16a34a; --na:#cbd5e1; --late:#dc2626;
  --soft:#f8fafc;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;background:#eef2f7;color:var(--ink);font-size:14px}
header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 24px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.hdr-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:space-between}
h1{margin:0;font-size:19px;letter-spacing:.3px}
.sub{font-size:12px;opacity:.85;margin-top:3px}
.btns{display:flex;gap:8px;flex-wrap:wrap}
button{border:0;border-radius:7px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.b-pri{background:#fff;color:var(--brand)}
.b-pri:hover{background:#e6eefc}
.b-gho{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4)}
.b-gho:hover{background:rgba(255,255,255,.28)}
.wrap{max-width:1500px;margin:0 auto;padding:20px 24px 60px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.06)}
.card-h{padding:13px 18px;background:var(--soft);border-bottom:1px solid var(--line);font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.card-b{padding:18px}
/* project grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;margin-bottom:4px}
.fld input,.fld textarea,.fld select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:2px solid var(--brand2);outline-offset:-1px}
/* dashboard */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.stat .n{font-size:26px;font-weight:800;line-height:1.1}
.stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.4px;margin-top:3px}
.bar{height:10px;background:#e8edf4;border-radius:6px;overflow:hidden;margin-top:8px}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand2),#22c55e);transition:width .3s}
/* phase */
.phase-h{display:flex;align-items:center;gap:12px;padding:14px 18px;background:linear-gradient(90deg,#0b4a8f,#1266c4);color:#fff;font-weight:700;cursor:pointer}
.phase-h .pill{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.phase-h .pct{margin-left:auto;font-size:13px;background:rgba(255,255,255,.18);padding:4px 12px;border-radius:20px}
.step{border-bottom:1px solid var(--line)}
.step:last-child{border-bottom:0}
.step-h{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;background:#fff}
.step-h:hover{background:#f5f8fc}
.step-no{background:var(--brand);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:0 0 26px}
.step-t{font-weight:700;font-size:13.5px;flex:1}
.step-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.tag{background:#eef4fb;color:var(--brand);padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:700;white-space:nowrap}
.tag.f{background:#fef3c7;color:#92400e}
.mini{width:70px;height:6px;background:#e8edf4;border-radius:4px;overflow:hidden}
.mini > i{display:block;height:100%;background:#22c55e}
.chev{color:var(--muted);font-size:11px;transition:.2s}
.open .chev{transform:rotate(90deg)}
.step-b{display:none;padding:0 0 8px}
.step.open .step-b{display:block}
table{width:100%;border-collapse:collapse}
th{background:#f1f5f9;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:left;padding:7px 8px;font-weight:800;border-bottom:1px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle;font-size:13px}
tr.done-row td:nth-child(2){text-decoration:line-through;color:var(--muted)}
tr.late td:nth-child(6) input{border-color:var(--late);background:#fef2f2;color:var(--late);font-weight:700}
td select,td input{width:100%;padding:5px 7px;border:1px solid var(--line);border-radius:5px;font-size:12px;font-family:inherit;background:#fff}
td.c{text-align:center}
.st{font-weight:700;font-size:11.5px;border-radius:5px;padding:5px 6px;border:1px solid var(--line)}
.st-todo{color:#475569}.st-doing{color:#b45309;background:#fffbeb;border-color:#fcd34d}
.st-done{color:#15803d;background:#f0fdf4;border-color:#86efac}.st-na{color:#94a3b8;background:#f8fafc}
.fcode{font-family:Consolas,monospace;font-size:11px;color:#92400e;background:#fef3c7;padding:2px 6px;border-radius:4px;white-space:nowrap}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);padding:10px 18px;background:var(--soft);border-top:1px solid var(--line)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
.toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;padding:13px 20px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transform:translateY(12px);transition:.25s;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateY(0)}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:12px 18px;background:var(--soft);border-bottom:1px solid var(--line)}
.filters select,.filters input{padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;font-family:inherit}
.hide{display:none!important}
@media print{header{position:static}.btns,.filters{display:none}.step-b{display:block!important}}
</style>
</head>

</header>

let DATA = null;

/* ---------- khởi tạo ---------- */
function init(){
  DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  DATA.meta.createdAt = new Date().toISOString();
  normalize();
  renderProject(); renderPhases(); refresh();
}
function normalize(){
  DATA.phases.forEach(ph=>ph.steps.forEach(st=>st.items.forEach((it,i)=>{
    it.id   = it.id   || `${ph.id}-${st.no}-${i+1}`;
    it.status = it.status || "todo";
    it.assignee = it.assignee ?? "";
    it.start = it.start ?? "";
    it.due   = it.due   ?? "";
    it.note  = it.note  ?? "";
    it.f     = it.f     ?? "";
  })));
}

/* ---------- thông tin dự án ---------- */
function renderProject(){
  document.getElementById("projGrid").innerHTML = PROJECT_FIELDS.map(f=>{
    const v = (DATA.project[f.k]||"").replace(/"/g,"&quot;");
    const inp = f.t==="textarea"
      ? `<textarea rows="2" oninput="setProj('${f.k}',this.value)">${DATA.project[f.k]||""}</textarea>`
      : `<input type="${f.t}" value="${v}" oninput="setProj('${f.k}',this.value)">`;
    return `<div class="fld"${f.t==="textarea"?' style="grid-column:1/-1"':""}><label>${f.l}</label>${inp}</div>`;
  }).join("");
}
function setProj(k,v){ DATA.project[k]=v; }

/* ---------- checklist ---------- */
function renderPhases(){
  document.getElementById("phases").innerHTML = DATA.phases.map(ph=>`
    <div class="card">
      <div class="phase-h" onclick="togglePhase('${ph.id}')">
        <span class="pill">${ph.code}</span>
        <span>${ph.title}</span>
        <span style="font-weight:400;font-size:11.5px;opacity:.85">${ph.ref}</span>
        <span class="pct" id="pct-${ph.id}">0%</span>
      </div>
      <div class="filters">
        <label style="font-size:12px;color:var(--muted);font-weight:700">Lọc:</label>
        <select onchange="filterPhase('${ph.id}',this.value)">
          <option value="all">Tất cả đầu việc</option>
          <option value="todo">Chưa làm</option>
          <option value="doing">Đang làm</option>
          <option value="done">Hoàn thành</option>
          <option value="open">Chưa xong (Chưa làm + Đang làm)</option>
          <option value="late">Trễ hạn</option>
        </select>
        <button class="b-pri" style="background:#e6eefc" onclick="bulk('${ph.id}','done')">Đánh dấu xong cả giai đoạn</button>
        <button class="b-pri" style="background:#f1f5f9" onclick="bulk('${ph.id}','todo')">Reset giai đoạn</button>
      </div>
      <div id="body-${ph.id}">
        ${ph.steps.map(st=>stepHTML(ph,st)).join("")}
      </div>
      <div class="legend">
        <span><i class="dot" style="background:var(--todo)"></i>Chưa làm</span>
        <span><i class="dot" style="background:var(--doing)"></i>Đang làm</span>
        <span><i class="dot" style="background:var(--done)"></i>Hoàn thành</span>
        <span><i class="dot" style="background:var(--na)"></i>Không áp dụng (loại khỏi %)</span>
        <span><i class="dot" style="background:var(--late)"></i>Trễ hạn</span>
      </div>
    </div>`).join("");
}

function stepHTML(ph,st){
  const sid = `${ph.id}-s${st.no}`;
  return `<div class="step" id="${sid}">
    <div class="step-h" onclick="toggleStep('${sid}')">
      <span class="chev">▶</span>
      <span class="step-no">${st.no}</span>
      <span class="step-t">${st.title}</span>
      <span class="step-meta">
        <span class="tag">⏱ ${st.dur}</span>
        <span class="tag">▶ ${st.doer}</span>
        ${st.ctrl && st.ctrl!=="—" ? `<span class="tag">✓ ${st.ctrl}</span>`:""}
        ${st.forms.map(f=>`<span class="tag f">${f}</span>`).join("")}
      </span>
      <span class="mini"><i id="mini-${sid}" style="width:0%"></i></span>
      <span style="font-size:11px;color:var(--muted);width:52px;text-align:right" id="cnt-${sid}">0/0</span>
    </div>
    <div class="step-b">
      <table>
        <thead><tr>
          <th style="width:34px">#</th><th>Nội dung công việc</th>
          <th style="width:78px">Biểu mẫu</th><th style="width:132px">Trạng thái</th>
          <th style="width:150px">Người phụ trách</th><th style="width:126px">Bắt đầu</th>
          <th style="width:126px">Hạn hoàn thành</th><th style="width:200px">Ghi chú</th>
        </tr></thead>
        <tbody>
        ${st.items.map((it,i)=>`
          <tr id="row-${it.id}" data-status="${it.status}">
            <td class="c" style="color:var(--muted);font-size:11px">${i+1}</td>
            <td>${it.t}</td>
            <td class="c">${it.f?`<span class="fcode">${it.f}</span>`:'<span style="color:#cbd5e1">—</span>'}</td>
            <td><select class="st ${STATUS[it.status].c}" onchange="setItem('${it.id}','status',this.value)">
              ${Object.keys(STATUS).map(k=>`<option value="${k}"${it.status===k?" selected":""}>${STATUS[k].l}</option>`).join("")}
            </select></td>
            <td><select onchange="setItem('${it.id}','assignee',this.value)">
              ${OWNERS.map(o=>`<option value="${o}"${it.assignee===o?" selected":""}>${o||"— chọn —"}</option>`).join("")}
            </select></td>
            <td><input type="date" value="${it.start}" onchange="setItem('${it.id}','start',this.value)"></td>
            <td><input type="date" value="${it.due}" onchange="setItem('${it.id}','due',this.value)"></td>
            <td><input type="text" value="${(it.note||'').replace(/"/g,'&quot;')}" placeholder="ghi chú…" onchange="setItem('${it.id}','note',this.value)"></td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>`;
}

function findItem(id){
  for(const ph of DATA.phases) for(const st of ph.steps){
    const it = st.items.find(x=>x.id===id); if(it) return it;
  }
  return null;
}
function setItem(id,key,val){
  const it = findItem(id); if(!it) return;
  it[key]=val;
  if(key==="status"){
    const sel = document.querySelector(`#row-${id} select.st`);
    sel.className = "st "+STATUS[val].c;
    document.getElementById(`row-${id}`).dataset.status = val;
  }
  refresh();
}
function bulk(phId,status){
  const ph = DATA.phases.find(p=>p.id===phId);
  ph.steps.forEach(st=>st.items.forEach(it=>{ if(it.status!=="na") it.status=status; }));
  renderPhases(); refresh();
  toast(status==="done"?"Đã đánh dấu hoàn thành toàn giai đoạn":"Đã reset giai đoạn");
}

/* ---------- tính toán tiến độ ---------- */
function calc(items){
  const act = items.filter(i=>i.status!=="na");
  const done = act.filter(i=>i.status==="done").length;
  const w = act.reduce((s,i)=>s+STATUS[i.status].w,0);
  return {total:act.length, done, pct: act.length? Math.round(w/act.length*100):0};
}
function refresh(){
  const today = new Date().toISOString().slice(0,10);
  let all=[], sTodo=0,sDoing=0,sDone=0,sNa=0,sLate=0;

  DATA.phases.forEach(ph=>{
    let pItems=[];
    ph.steps.forEach(st=>{
      const c = calc(st.items);
      const sid=`${ph.id}-s${st.no}`;
      const mini=document.getElementById(`mini-${sid}`), cnt=document.getElementById(`cnt-${sid}`);
      if(mini) mini.style.width = c.pct+"%";
      if(cnt)  cnt.textContent  = `${c.done}/${c.total}`;
      pItems = pItems.concat(st.items);
      st.items.forEach(it=>{
        const row=document.getElementById(`row-${it.id}`);
        const late = it.due && it.due<today && it.status!=="done" && it.status!=="na";
        if(row) row.classList.toggle("late", !!late);
        if(row) row.classList.toggle("done-row", it.status==="done");
        if(late) sLate++;
        if(it.status==="todo")sTodo++; else if(it.status==="doing")sDoing++;
        else if(it.status==="done")sDone++; else sNa++;
      });
    });
    const pc=calc(pItems);
    const el=document.getElementById(`pct-${ph.id}`);
    if(el) el.textContent = `${pc.pct}% · ${pc.done}/${pc.total}`;
    all = all.concat(pItems);
  });

  const a=calc(all);
  document.getElementById("mainBar").style.width = a.pct+"%";
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="n" style="color:var(--brand)">${a.pct}%</div><div class="l">Hoàn thành chung</div></div>
    <div class="stat"><div class="n">${all.length}</div><div class="l">Tổng đầu việc</div></div>
    <div class="stat"><div class="n" style="color:var(--done)">${sDone}</div><div class="l">Đã xong</div></div>
    <div class="stat"><div class="n" style="color:var(--doing)">${sDoing}</div><div class="l">Đang làm</div></div>
    <div class="stat"><div class="n" style="color:var(--todo)">${sTodo}</div><div class="l">Chưa làm</div></div>
    <div class="stat"><div class="n" style="color:var(--na)">${sNa}</div><div class="l">Không áp dụng</div></div>
    <div class="stat"><div class="n" style="color:var(--late)">${sLate}</div><div class="l">Trễ hạn</div></div>`;
}

/* ---------- UI ---------- */
function toggleStep(id){ document.getElementById(id).classList.toggle("open"); }
function togglePhase(id){
  const b=document.getElementById("body-"+id);
  b.style.display = b.style.display==="none" ? "" : "none";
}
function expandAll(open){
  document.querySelectorAll(".step").forEach(s=>s.classList.toggle("open",open));
}
function filterPhase(phId,mode){
  const today=new Date().toISOString().slice(0,10);
  const ph=DATA.phases.find(p=>p.id===phId);
  ph.steps.forEach(st=>st.items.forEach(it=>{
    const row=document.getElementById(`row-${it.id}`); if(!row) return;
    const late = it.due && it.due<today && it.status!=="done" && it.status!=="na";
    let show=true;
    if(mode==="open") show = it.status==="todo"||it.status==="doing";
    else if(mode==="late") show = !!late;
    else if(mode!=="all") show = it.status===mode;
    row.classList.toggle("hide",!show);
  }));
  if(mode!=="all") expandAll(true);
}
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2600);
}

/* ---------- EXPORT / IMPORT JSON ---------- */
function slug(s){
  return (s||"DU-AN").normalize("NFD").replace(/[\u0300-\u036f]/g,"")  .replace(/đ/g,"d").replace(/Đ/g,"D")
    .replace(/[^a-zA-Z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,70);
}
function stamp(d){
  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}h${p(d.getMinutes())}`;
}
function exportJSON(){
  const now=new Date();
  DATA.meta.exportedAt = now.toISOString();
  DATA.meta.editedAt   = stamp(now);
  // Tên file = TÊN DỰ ÁN + NGÀY EDIT
  const proc = (DATA.meta && DATA.meta.process) ? DATA.meta.process+"_" : "";
  const fname = `${slug(DATA.project.name)}_${proc}${stamp(now)}.json`;
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=fname; a.click();
  URL.revokeObjectURL(a.href);
  toast("Đã xuất: "+fname);
}
function importJSON(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.phases||!d.project) throw new Error("Cấu trúc file không hợp lệ");
      const want="QT25";
      const got=(d.meta&&d.meta.process)||"";
      if(got && got!==want && !confirm(`File này thuộc quy trình ${got}, không phải ${want}. Vẫn nạp?`)) {input.value="";return;}
      DATA=d; normalize(); renderProject(); renderPhases(); refresh();
      toast("Đã nạp dữ liệu từ: "+f.name);
    }catch(err){ alert("Không đọc được file JSON: "+err.message); }
    input.value="";
  };
  r.readAsText(f,"utf-8");
}

init();
</script>
