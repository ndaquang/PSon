<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Danh bạ Email — Tra cứu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1F2EF;
    --surface:#FBFBFA;
    --ink:#1B1E24;
    --muted:#71757E;
    --faint:#9A9DA4;
    --line:#E1E2DD;
    --line-strong:#CFD0CA;
    --accent:#1E6F52;
    --accent-ink:#15543E;
    --accent-soft:#E4EFE9;
    --gate:#15171C;
    --gate-line:#2A2D35;
    --danger:#B23B3B;
    --shadow:0 1px 2px rgba(27,30,36,.04),0 8px 28px rgba(27,30,36,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  .grot{font-family:"Space Grotesk",sans-serif}

  /* ---------- LOGIN GATE ---------- */
  #gate{
    position:fixed;inset:0;z-index:100;
    background:var(--gate);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .gate-card{
    width:100%;max-width:380px;
    color:#E9EAEC;
  }
  .gate-mark{
    display:flex;align-items:center;gap:10px;margin-bottom:28px;
  }
  .gate-mark .dot{
    width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px rgba(30,111,82,.18);
  }
  .gate-mark .lbl{
    font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:#8A8E96;
  }
  .gate-card h1{
    font-family:"Space Grotesk",sans-serif;font-weight:600;
    font-size:26px;line-height:1.15;margin:0 0 6px;letter-spacing:-.01em;
  }
  .gate-card .sub{color:#888C95;font-size:13px;margin:0 0 30px}
  .field{margin-bottom:16px}
  .field label{
    display:block;font-family:"IBM Plex Mono",monospace;font-size:10.5px;
    letter-spacing:.14em;text-transform:uppercase;color:#80848D;margin-bottom:7px;
  }
  .field input{
    width:100%;padding:12px 14px;border-radius:9px;
    background:#1D2027;border:1px solid var(--gate-line);
    color:#F2F3F5;font-family:"IBM Plex Mono",monospace;font-size:14px;
    letter-spacing:.03em;transition:border-color .15s,box-shadow .15s;
  }
  .field input::placeholder{color:#565A62}
  .field input:focus{
    outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(30,111,82,.22);
  }
  .gate-row{display:flex;align-items:center;justify-content:space-between;margin:18px 0 22px}
  .remember{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;color:#A6AAB2;font-size:12.5px}
  .remember input{position:absolute;opacity:0;width:0;height:0}
  .box{
    width:17px;height:17px;border-radius:5px;border:1.5px solid #3A3E47;
    display:grid;place-items:center;transition:.15s;flex:none;
  }
  .remember input:checked + .box{background:var(--accent);border-color:var(--accent)}
  .box svg{opacity:0;transition:.15s}
  .remember input:checked + .box svg{opacity:1}
  .unlock{
    width:100%;padding:13px;border:none;border-radius:9px;cursor:pointer;
    background:var(--accent);color:#fff;font-family:"Space Grotesk",sans-serif;
    font-weight:600;font-size:14px;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:background .15s,transform .05s;
  }
  .unlock:hover{background:var(--accent-ink)}
  .unlock:active{transform:translateY(1px)}
  .unlock:disabled{opacity:.6;cursor:default}
  .gate-err{
    margin-top:16px;font-size:12.5px;color:#E69A9A;min-height:18px;
    display:flex;align-items:center;gap:7px;
  }
  .gate-foot{margin-top:26px;font-size:11px;color:#565A62;line-height:1.55}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---------- APP ---------- */
  #app{display:none;height:100vh;flex-direction:column}
  header.top{
    display:flex;align-items:center;gap:18px;
    padding:0 22px;height:60px;flex:none;
    background:var(--surface);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:11px;flex:none}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .brand .t{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;letter-spacing:-.01em}
  .brand .t span{color:var(--muted);font-weight:400}
  .searchbar{
    flex:1;max-width:520px;position:relative;
  }
  .searchbar svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint)}
  .searchbar input{
    width:100%;padding:10px 14px 10px 38px;border-radius:10px;
    border:1px solid var(--line-strong);background:var(--paper);
    font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--ink);
    transition:.15s;
  }
  .searchbar input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,111,82,.14);background:#fff}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex:none}
  .stat{font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--muted);letter-spacing:.02em}
  .stat b{color:var(--ink);font-weight:500}
  .logout{
    border:1px solid var(--line-strong);background:none;border-radius:8px;
    padding:7px 12px;font-size:12.5px;color:var(--muted);cursor:pointer;
    font-family:"Inter",sans-serif;transition:.15s;display:flex;align-items:center;gap:6px;
  }
  .logout:hover{color:var(--ink);border-color:var(--ink)}

  .body{flex:1;display:flex;min-height:0}

  /* company rail */
  aside.rail{
    width:288px;flex:none;background:var(--surface);
    border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;
  }
  .rail-head{padding:16px 16px 12px}
  .rail-title{
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--faint);margin-bottom:10px;
  }
  .rail-search{position:relative}
  .rail-search input{
    width:100%;padding:9px 12px 9px 32px;border-radius:9px;
    border:1px solid var(--line-strong);background:var(--paper);
    font-size:13px;color:var(--ink);font-family:"Inter",sans-serif;
  }
  .rail-search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,111,82,.12);background:#fff}
  .rail-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint)}
  .rail-list{flex:1;overflow-y:auto;padding:4px 8px 16px}
  .co{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
    cursor:pointer;transition:background .12s;
  }
  .co:hover{background:var(--paper)}
  .co.on{background:var(--accent-soft)}
  .co .nm{flex:1;min-width:0;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .co.on .nm{color:var(--accent-ink);font-weight:500}
  .co .ct{
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--faint);
    background:var(--paper);padding:1px 7px;border-radius:20px;flex:none;
  }
  .co.on .ct{background:#fff;color:var(--accent)}
  .co.all{border-bottom:1px solid var(--line);border-radius:0;margin-bottom:4px;padding-bottom:13px}
  .co.all .nm{font-weight:500}

  /* results */
  main.results{flex:1;overflow-y:auto;min-height:0;background:var(--paper)}
  .res-inner{max-width:920px;margin:0 auto;padding:26px 28px 60px}
  .scope{
    display:flex;align-items:baseline;gap:14px;margin-bottom:4px;
    animation:rise .35s ease;
  }
  .scope h2{
    font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:22px;
    margin:0;letter-spacing:-.01em;word-break:break-all;
  }
  .scope .cnt{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--muted);flex:none}
  .scope-sub{font-size:12.5px;color:var(--faint);margin-bottom:22px}

  .rows{display:flex;flex-direction:column;gap:0}
  .rows.anim{animation:slide .32s cubic-bezier(.22,.61,.36,1)}
  @keyframes slide{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .row{
    display:grid;grid-template-columns:1fr 200px 96px;align-items:center;gap:16px;
    padding:13px 16px;background:var(--surface);
    border:1px solid var(--line);border-top:none;
  }
  .row:first-child{border-top:1px solid var(--line);border-radius:10px 10px 0 0}
  .row:last-child{border-radius:0 0 10px 10px}
  .row:only-child{border-radius:10px}
  .row:hover{background:#fff}
  .r-email{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--ink);word-break:break-all;display:flex;align-items:center;gap:9px}
  .r-email .copy{
    flex:none;opacity:0;border:none;background:none;cursor:pointer;color:var(--faint);
    padding:2px;border-radius:5px;transition:.12s;
  }
  .row:hover .copy{opacity:1}
  .r-email .copy:hover{color:var(--accent);background:var(--accent-soft)}
  .r-name{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .r-src{justify-self:end}
  .tag{
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.04em;
    padding:3px 8px;border-radius:20px;white-space:nowrap;
    background:var(--paper);color:var(--muted);border:1px solid var(--line);
  }
  .tag.contact{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}

  .empty{text-align:center;padding:70px 20px;color:var(--faint)}
  .empty .big{font-family:"Space Grotesk",sans-serif;font-size:17px;color:var(--muted);margin-bottom:6px}
  .more{
    margin:18px auto 0;display:block;padding:10px 20px;border-radius:9px;
    border:1px solid var(--line-strong);background:var(--surface);cursor:pointer;
    font-family:"Inter",sans-serif;font-size:13px;color:var(--muted);transition:.15s;
  }
  .more:hover{color:var(--ink);border-color:var(--ink)}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:9px 16px;border-radius:9px;font-size:12.5px;
    opacity:0;pointer-events:none;transition:.2s;z-index:50;font-family:"IBM Plex Mono",monospace;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:760px){
    aside.rail{position:fixed;z-index:40;inset:60px 0 auto 0;width:100%;height:46vh;
      border-right:none;border-bottom:1px solid var(--line);transform:translateY(-101%);
      transition:transform .25s;box-shadow:var(--shadow)}
    aside.rail.open{transform:none}
    .menu-btn{display:flex !important}
    .row{grid-template-columns:1fr;gap:6px}
    .r-src{justify-self:start}
    .searchbar{max-width:none}
    .stat.hide-sm{display:none}
  }
  .menu-btn{display:none;align-items:center;gap:7px;border:1px solid var(--line-strong);
    background:none;border-radius:8px;padding:7px 11px;font-size:12.5px;color:var(--muted);cursor:pointer}
</style>
</head>
<body>

<!-- ===== LOGIN GATE ===== -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-mark">
      <span class="dot"></span>
      <span class="lbl">Khu vực bảo mật</span>
    </div>
    <h1 class="grot">Danh bạ Email</h1>
    <p class="sub">Nhập mã truy cập để giải mã dữ liệu liên hệ.</p>

    <div class="field">
      <label for="gid">Mã ID</label>
      <input id="gid" class="mono" type="text" autocomplete="username" placeholder="••••••••••" spellcheck="false">
    </div>
    <div class="field">
      <label for="gpw">Mật khẩu</label>
      <div style="position:relative">
        <input id="gpw" class="mono" type="password" autocomplete="current-password" placeholder="••••••••" spellcheck="false" style="padding-right:44px">
        <button id="togglePw" type="button" aria-label="Hiện mật khẩu" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#80848D;padding:6px;border-radius:6px;display:flex">
          <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="gate-row">
      <label class="remember">
        <input id="grem" type="checkbox">
        <span class="box"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        Ghi nhớ mã ID
      </label>
    </div>

    <button id="unlock" class="unlock"><span id="ulabel">Mở khóa</span></button>
    <div id="gerr" class="gate-err"></div>

    <div class="gate-foot">
      Dữ liệu được mã hóa AES‑256. Mật khẩu không lưu trên máy chủ và không nằm trong mã nguồn trang.
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <header class="top">
    <button class="menu-btn" id="menuBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Công ty
    </button>
    <div class="brand">
      <span class="dot"></span>
      <span class="t grot">Danh bạ Email <span>/ tra cứu</span></span>
    </div>
    <div class="searchbar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <input id="search" type="text" placeholder="Tìm theo email hoặc tên…" spellcheck="false">
    </div>
    <div class="top-right">
      <span class="stat hide-sm">Tổng <b id="statTotal">0</b> liên hệ · <b id="statCo">0</b> công ty</span>
      <button class="logout" id="logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Khóa
      </button>
    </div>
  </header>

  <div class="body">
    <aside class="rail" id="rail">
      <div class="rail-head">
        <div class="rail-title">Lọc theo công ty</div>
        <div class="rail-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <input id="coSearch" type="text" placeholder="Lọc danh sách công ty…" spellcheck="false">
        </div>
      </div>
      <div class="rail-list" id="coList"></div>
    </aside>

    <main class="results" id="results">
      <div class="res-inner">
        <div class="scope">
          <h2 id="scopeName" class="grot">Tất cả công ty</h2>
          <span class="cnt" id="scopeCnt"></span>
        </div>
        <div class="scope-sub" id="scopeSub"></div>
        <div class="rows" id="rows"></div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ---- crypto helpers (Web Crypto) ---- */
function b64ToBuf(b64){const bin=atob(b64);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u.buffer;}
async function deriveKey(pw,salt,iter){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function decryptPayload(pw){
  const salt=b64ToBuf(ENC.salt),iv=b64ToBuf(ENC.iv),ct=b64ToBuf(ENC.ct);
  const key=await deriveKey(pw,salt,ENC.iter);
  let pt;
  try{
    pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct); // sai mật khẩu -> ném ở đây
  }catch(e){const err=new Error('bad-password');err.kind='password';throw err;}
  const txt=new TextDecoder().decode(pt);
  const obj=JSON.parse(txt); // nếu lỗi ở đây là lỗi dữ liệu, không phải mật khẩu
  return obj;
}

    gerr('Trình duyệt chặn giải mã. Hãy mở trang qua https:// (GitHub Pages) thay vì http.');return;

  if(id!==EXPECTED_ID){gerr('Mã ID không đúng.');gid.focus();return;}
  if(!pw){gerr('Vui lòng nhập mật khẩu.');gpw.focus();return;}
  const btn=$('unlock');btn.disabled=true;$('ulabel').innerHTML='<span class="spin"></span>';
  try{
    DATA=await decryptPayload(pw);
    if(grem.checked)localStorage.setItem('dir_id',id);else localStorage.removeItem('dir_id');
    boot();
    $('gate').style.display='none';
    $('app').style.display='flex';
  }catch(e){
    if(e&&e.kind==='password'){
      gerr('Mật khẩu không đúng — không giải mã được dữ liệu.');
      gpw.value='';gpw.focus();
    }else{
      gerr('Mật khẩu đúng nhưng dữ liệu lỗi: '+(e&&e.message?e.message:'không đọc được'));
    }
    btn.disabled=false;$('ulabel').textContent='Mở khóa';
  }
}
$('unlock').addEventListener('click',tryUnlock);
$('togglePw').addEventListener('click',()=>{
  const show=gpw.type==='password';gpw.type=show?'text':'password';
  $('eyeIcon').innerHTML=show
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>';
  gpw.focus();
});
gpw.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
gid.addEventListener('keydown',e=>{if(e.key==='Enter')gpw.focus();});

/* ---- app boot ---- */
function boot(){
  RECORDS=DATA.records;
  COMPANIES=DATA.companies;
  byCo={};
  for(const r of RECORDS){const g=(r.g||'—');(byCo[g]=byCo[g]||[]).push(r);}
  $('statTotal').textContent=RECORDS.length.toLocaleString('vi-VN');
  $('statCo').textContent=COMPANIES.length.toLocaleString('vi-VN');
  renderRail();
  render();
  $('search').addEventListener('input',e=>{query=e.target.value.trim().toLowerCase();shown=PAGE;render();});
  $('coSearch').addEventListener('input',e=>{coQuery=e.target.value.trim().toLowerCase();renderRail();});
  $('logout').addEventListener('click',()=>location.reload());
  $('menuBtn').addEventListener('click',()=>$('rail').classList.toggle('open'));
}

/* ---- company rail ---- */
function renderRail(){
  const list=$('coList');list.innerHTML='';
  const allEl=document.createElement('div');
  allEl.className='co all'+(curCo===null?' on':'');
  allEl.innerHTML=`<span class="nm">Tất cả công ty</span><span class="ct">${RECORDS.length.toLocaleString('vi-VN')}</span>`;
  allEl.onclick=()=>selectCo(null);
  list.appendChild(allEl);
  const cos=coQuery?COMPANIES.filter(c=>c.toLowerCase().includes(coQuery)):COMPANIES;
  for(const c of cos){
    const el=document.createElement('div');
    el.className='co'+(curCo===c?' on':'');
    el.innerHTML=`<span class="nm" title="${esc(c)}">${esc(c)}</span><span class="ct">${(byCo[c]||[]).length}</span>`;
    el.onclick=()=>selectCo(c);
    list.appendChild(el);
  }
  if(cos.length===0){const e=document.createElement('div');e.style.cssText='padding:14px 10px;color:var(--faint);font-size:12.5px';e.textContent='Không có công ty khớp.';list.appendChild(e);}
}
function selectCo(c){
  curCo=c;shown=PAGE;
  document.querySelectorAll('.co').forEach(x=>x.classList.remove('on'));
  render(true);renderRail();
  if(window.innerWidth<=760)$('rail').classList.remove('open');
  $('results').scrollTop=0;
}

/* ---- results ---- */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function matches(r){
  if(!query)return true;
  return (r.e&&r.e.toLowerCase().includes(query))||(r.n&&String(r.n).toLowerCase().includes(query));
}
function render(animate){
  const pool=curCo===null?RECORDS:(byCo[curCo]||[]);
  const filtered=query?pool.filter(matches):pool;
  $('scopeName').textContent=curCo===null?'Tất cả công ty':curCo;
  $('scopeCnt').textContent=filtered.length.toLocaleString('vi-VN')+' liên hệ'+(query?' khớp':'');
  $('scopeSub').textContent=query
    ?`Đang tìm "${query}"${curCo?` trong ${curCo}`:' trên toàn bộ danh bạ'}`
    :(curCo?`Tên miền công ty: ${curCo}`:'Toàn bộ liên hệ, lọc theo công ty ở cột bên trái');

  const rows=$('rows');rows.innerHTML='';
  if(filtered.length===0){
    rows.innerHTML='<div class="empty"><div class="big">Không tìm thấy liên hệ</div><div>Thử đổi từ khóa hoặc chọn công ty khác.</div></div>';
    return;
  }
  const slice=filtered.slice(0,shown);
  const frag=document.createDocumentFragment();
  for(const r of slice)frag.appendChild(rowEl(r));
  rows.appendChild(frag);
  if(filtered.length>shown){
    const b=document.createElement('button');b.className='more';
    b.textContent=`Xem thêm (${(filtered.length-shown).toLocaleString('vi-VN')} còn lại)`;
    b.onclick=()=>{shown+=PAGE;render();};
    rows.appendChild(b);
  }
  if(animate){rows.classList.remove('anim');void rows.offsetWidth;rows.classList.add('anim');}
}
function rowEl(r){
  const d=document.createElement('div');d.className='row';
  const isContact=r.s&&String(r.s).includes('Contacts');
  const srcShort=r.s==='Contacts + Email'?'C+E':(r.s==='Contacts'?'Contact':'Email');
  d.innerHTML=
    `<div class="r-email"><span>${esc(r.e)}</span>`+
    `<button class="copy" title="Sao chép email" data-e="${esc(r.e)}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>`+
    `<div class="r-name" title="${esc(r.n)}">${r.n&&String(r.n)!==r.e?esc(r.n):'<span style="color:var(--faint)">—</span>'}</div>`+
    `<div class="r-src"><span class="tag${isContact?' contact':''}">${srcShort}</span></div>`;
  d.querySelector('.copy').onclick=ev=>{ev.stopPropagation();copy(r.e);};
  return d;
}

/* ---- copy + toast ---- */
function copy(t){navigator.clipboard.writeText(t).then(()=>toast('Đã sao chép: '+t)).catch(()=>toast('Không sao chép được'));}
let tt;
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),1600);}
</script>
